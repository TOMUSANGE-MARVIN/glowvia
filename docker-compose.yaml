services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: innoshop-app:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-innoshop}
      DB_USERNAME: ${DB_USERNAME:-innoshop}
      DB_PASSWORD: ${DB_PASSWORD:-innoshop}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    volumes:
      - storage:/var/www/html/storage

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-innoshop}
      MYSQL_USER: ${DB_USERNAME:-innoshop}
      MYSQL_PASSWORD: ${DB_PASSWORD:-innoshop}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  storage:
  mysql_data:
  redis_data:
